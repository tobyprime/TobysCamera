name: TobysCamera
version: ${version}
main: dev.tobyscamera.folia.TobysCameraPlugin
api-version: '1.21'
folia-supported: true
description: Receives client-rendered camera tiles and turns them into persistent maps.
commands:
  tobyscamera:
    description: Reload TobysCamera or show its runtime status.
    usage: /tobyscamera <reload|status>
permissions:
  tobyscamera.reload:
    default: op
  tobyscamera.status:
    default: op
