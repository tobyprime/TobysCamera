name: TobysCamera
version: ${version}
main: dev.tobyscamera.folia.TobysCameraPlugin
api-version: '1.21'
folia-supported: true
description: Receives client-rendered camera tiles and turns them into persistent maps.
commands:
  tobyscamera:
    description: Reload TobysCamera or show its runtime status.
    usage: /tobyscamera <reload|status|detail|gallery>
permissions:
  tobyscamera.upload:
    description: Allows a player to capture and upload photos.
    default: true
  tobyscamera.admin:
    description: Grants administrative TobysCamera commands.
    default: false
    children:
      tobyscamera.reload: true
      tobyscamera.status: true
      tobyscamera.detail: true
  tobyscamera.reload:
    default: false
  tobyscamera.status:
    default: false
  tobyscamera.detail:
    default: false
