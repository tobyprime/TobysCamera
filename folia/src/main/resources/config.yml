camera-tag-key: "tobyscamera:camera"
film-tag-key: "tobyscamera:film"
token-ttl-seconds: 60
rate-limit:
  per-second: 1
  per-minute: 12
upload:
  max-grid-size: 4
  chunk-bytes: 8192
  timeout-seconds: 30
video:
  max-fps: 10
  max-frames: 100
  max-upload-chunks-per-second: 120
  max-active-map-frames: 128
  max-update-distance: 128
invalid-token:
  kick-message: "Invalid or expired photo upload token"
